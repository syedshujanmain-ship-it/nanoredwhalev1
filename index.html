<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=0.85, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover, minimum-scale=0.85" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      /* Global box-sizing for professional layout */
      *, *::before, *::after {
        box-sizing: border-box;
      }
      
      /* Disable elastic/bouncy scrolling - but allow normal scrolling */
      html, body {
        overscroll-behavior: none;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
        font-size: 13px; /* Compact base font size */
      }
      
      #root {
        overscroll-behavior: none;
      }
      
      /* Prevent text overflow and ensure proper wrapping */
      * {
        word-wrap: break-word;
        overflow-wrap: break-word;
        word-break: break-word;
      }
      
      /* Prevent horizontal scroll - force 100% width max */
      html, body, #root {
        overflow-x: hidden;
        max-width: 100vw;
        width: 100%;
      }
      
      /* Better mobile text rendering */
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      /* Compact code blocks - strict no overflow */
      pre, code {
        max-width: 100% !important;
        overflow-x: auto !important;
        font-size: 11px !important;
        word-wrap: break-word !important;
        white-space: pre-wrap !important;
      }
      
      /* Responsive container with flexbox */
      .responsive-container {
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        width: 95%;
        max-width: 95%;
        margin: 0 auto;
      }
      
      @media (min-width: 768px) {
        .responsive-container {
          width: 80%;
          max-width: 80%;
        }
      }
      
      /* Intro fade-out animation */
      @keyframes fadeOut {
        0% { opacity: 1; }
        100% { opacity: 0; }
      }
      
      .intro-fade-out {
        animation: fadeOut 1.5s ease-out forwards;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
